<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AWAD POS</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #eef2f7;
      padding-bottom: 80px;
    }

    header {
      background: #1f2d3d;
      color: white;
      padding: 12px 15px 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    header h2 {
      margin: 0;
      font-size: 22px;
    }

    #search {
      padding: 9px 10px;
      border: none;
      border-radius: 8px;
      width: 220px;
      max-width: 100%;
    }

    #messageBar {
      width: 100%;
      margin-top: 4px;
      background: #2ecc71;
      color: white;
      padding: 5px 10px;
      border-radius: 6px;
      display: none;
      font-size: 12px;
      font-weight: 300;
      line-height: 1.2;
    }

    #messageBar.error { background: #e74c3c; }
    #messageBar.info { background: #3498db; }
    #messageBar.success { background: #2ecc71; }

    .container {
      padding: 20px;
    }

    .top-actions {
      margin-bottom: 15px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .grid-products {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 15px;
    }

    .product {
      background: white;
      border-radius: 14px;
      padding: 14px;
      text-align: center;
      box-shadow: 0 3px 8px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .product img {
      width: 110px;
      height: 110px;
      object-fit: cover;
      border-radius: 12px;
      margin: 0 auto 10px;
      background: #f2f2f2;
      display: block;
    }

    .product .name {
      font-size: 17px;
      font-weight: bold;
      margin-bottom: 6px;
      display: block;
      word-break: break-word;
    }

    .product .desc {
      font-size: 13px;
      color: #666;
      margin-bottom: 8px;
      min-height: 32px;
      line-height: 1.3;
      width: 100%;
    }

    .product .meta {
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 8px;
      width: 100%;
      text-align: left;
    }

    .product input.qty {
      width: 100%;
      padding: 8px;
      margin-top: 4px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    .product .actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 8px;
      width: 100%;
    }

    #reportsGrid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 15px;
    }

    .report-box {
      background: white;
      border-radius: 12px;
      padding: 14px;
      min-height: 220px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: 0 3px 8px rgba(0,0,0,0.08);
    }

    .report-items {
      margin-top: 8px;
      font-size: 14px;
      line-height: 1.5;
    }

    button {
      background: #3498db;
      color: white;
      border: none;
      padding: 9px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      opacity: 0.92;
    }

    button.secondary { background: #7f8c8d; }
    button.success { background: #2ecc71; }
    button.danger { background: #e74c3c; }

    input, textarea {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      font-family: Arial, sans-serif;
    }

    textarea {
      resize: vertical;
      min-height: 70px;
    }

    .cart-box {
      background: white;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.08);
      max-width: 700px;
    }

    #cartList {
      padding-left: 18px;
    }

    .cart-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 15px;
    }

    footer {
      background: #1f2d3d;
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      justify-content: space-around;
      padding: 8px 0;
      box-shadow: 0 -2px 6px rgba(0,0,0,0.2);
      z-index: 30;
    }

    footer button {
      flex: 1;
      margin: 0 5px;
      padding: 12px;
      background: #34495e;
      border-radius: 8px;
    }

    footer button:hover {
      background: #2ecc71;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 50;
      padding: 15px;
    }

    .modal-box {
      background: white;
      width: 100%;
      max-width: 480px;
      padding: 20px;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-box h3 {
      margin-top: 0;
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: bold;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .hidden { display: none !important; }

    .empty-state {
      background: white;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      color: #666;
      box-shadow: 0 3px 8px rgba(0,0,0,0.08);
    }

    .lock-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #1f2d3d, #34495e);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 200;
      padding: 20px;
    }

    .lock-box {
      background: white;
      width: 100%;
      max-width: 420px;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      text-align: center;
    }

    .lock-box h2 {
      margin-top: 0;
      margin-bottom: 10px;
    }

    .lock-box p {
      color: #666;
      font-size: 14px;
      margin-bottom: 16px;
    }

    .lock-box input {
      width: 100%;
      margin-bottom: 10px;
    }

    .small-note {
      font-size: 12px;
      color: #777;
      margin-top: 8px;
    }


    .admin-card {
      background: white;
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.08);
      overflow-x: auto;
    }

    .admin-table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      min-width: 720px;
    }

    .admin-table th,
    .admin-table td {
      border: 1px solid #ddd;
      padding: 9px;
      text-align: left;
      font-size: 14px;
    }

    .admin-table th {
      background: #1f2d3d;
      color: white;
    }

    .admin-table input {
      width: 100px;
      padding: 7px;
    }

    .profit-positive { color: #27ae60; font-weight: bold; }
    .profit-negative { color: #e74c3c; font-weight: bold; }

  </style>
</head>
<body>

  <div id="lockScreen" class="lock-screen">
    <div class="lock-box">
      <h2>🔒 AWAD POS</h2>
      <p id="lockText">Enter password to unlock your encrypted data</p>

      <input id="unlockPassword" type="password" placeholder="Password">
      <input id="unlockPasswordConfirm" type="password" placeholder="Confirm password" class="hidden">

      <button id="unlockBtn" class="success" onclick="handleUnlock()">Unlock</button>
      <div class="small-note" id="lockNote"></div>
    </div>
  </div>

  <header>
    <h2>🛒 AWAD POS</h2>
    <input id="search" placeholder="Search products..." onkeyup="searchProduct()" class="hidden">
    <div id="messageBar"></div>
  </header>

  <div class="container hidden" id="home">
    <div class="top-actions">
      <button class="success" onclick="openProductModal()">➕ Add Product</button>
    </div>
    <div id="productList" class="grid-products"></div>
  </div>

  <div class="container hidden" id="cart">
    <div class="cart-box">
      <h2>Cart</h2>
      <ul id="cartList"></ul>
      <h3>Total: <span id="total">0.00</span>$</h3>

      <div class="form-group">
        <label for="client">Client Name</label>
        <input id="client" placeholder="Enter client name">
      </div>

      <div class="cart-actions">
        <button class="success" onclick="checkout('Cash')">Cash</button>
        <button onclick="checkout('Borrow')">Borrow</button>
        <button class="danger" onclick="clearCart()">Clear Cart</button>
      </div>
    </div>
  </div>

  <div class="container hidden" id="report">
    <h2>Reports</h2>
    <div id="reportsGrid"></div>
  </div>

  <div id="productModal" class="modal hidden">
    <div class="modal-box">
      <h3 id="productModalTitle">Add Product</h3>

      <div class="form-group">
        <label for="productCode">Product Code</label>
        <input id="productCode" type="text" placeholder="Enter product code">
      </div>

      <div class="form-group">
        <label for="productBarcode">Barcode</label>
        <input id="productBarcode" type="text" placeholder="Enter barcode">
      </div>

      <div class="form-group">
        <label for="productName">Product Name</label>
        <input id="productName" type="text" placeholder="Enter product name">
      </div>

      <div class="form-group">
        <label for="productDesc">Description</label>
        <textarea id="productDesc" placeholder="Enter description"></textarea>
      </div>

      <div class="form-group">
        <label for="productPrice">Price</label>
        <input id="productPrice" type="number" min="0" step="0.01" placeholder="Enter price">
      </div>

      <div class="form-group">
        <label for="productStock">Stock</label>
        <input id="productStock" type="number" min="0" step="1" placeholder="Enter stock">
      </div>

      <div class="form-group">
        <label for="productImg">Image URL</label>
        <input id="productImg" type="text" placeholder="Enter image URL">
      </div>

      <div class="modal-actions">
        <button class="secondary" onclick="closeProductModal()">Cancel</button>
        <button class="success" onclick="saveProduct()">Save</button>
      </div>
    </div>
  </div>

  <div id="passModal" class="modal hidden">
    <div class="modal-box">
      <h3>Password</h3>
      <div class="form-group">
        <input type="password" id="passInput" placeholder="Enter password">
      </div>
      <div class="modal-actions">
        <button class="secondary" onclick="closePassModal()">Cancel</button>
        <button onclick="confirmPass()">Confirm</button>
      </div>
    </div>
  </div>


  <div class="container hidden" id="adminLogin">
    <div class="cart-box">
      <h2>🔐 Admin Login</h2>

      <div class="form-group">
        <label for="adminUser">Username</label>
        <input id="adminUser" type="text" placeholder="Enter admin username">
      </div>

      <div class="form-group">
        <label for="adminPass">Password</label>
        <input id="adminPass" type="password" placeholder="Enter admin password">
      </div>

      <button class="success" onclick="adminLogin()">Login</button>
    </div>
  </div>

  <div class="container hidden" id="adminPage">
    <h2>💰 Admin Cost / Profit Dashboard</h2>
    <div class="top-actions">
      <button onclick="renderAdminProfit()">🔄 Refresh</button>
      <button class="secondary" onclick="adminLogout()">Logout Admin</button>
    </div>
    <div id="adminProducts" class="admin-card"></div>
  </div>

  <footer class="hidden" id="appFooter">
    <button onclick="show('home')">🏠 Home</button>
    <button onclick="show('cart')">🛒 Cart</button>
    <button onclick="show('report')">📊 Reports</button>
    <button onclick="show('adminLogin')">🔐 Admin</button>
  </footer>

  <script>
    const API_URL = "https://awad-pos-online-production.up.railway.app";
    const LOGIN_PASSWORD = "2488";

    let products = [];
    let cart = [];
    let reportsData = [];
    let mode = null;
    let index = null;
    let editingIndex = null;
    let appPassword = LOGIN_PASSWORD;
    let adminLoggedIn = false;

    const STORAGE_KEY = "awad_pos_encrypted_data_v1";
    const PASS_FLAG_KEY = "awad_pos_has_password_v1";

    const productList = document.getElementById("productList");
    const cartList = document.getElementById("cartList");
    const totalEl = document.getElementById("total");
    const clientInput = document.getElementById("client");
    const reportsGrid = document.getElementById("reportsGrid");
    const searchInput = document.getElementById("search");
    const messageBar = document.getElementById("messageBar");

    const productModal = document.getElementById("productModal");
    const productModalTitle = document.getElementById("productModalTitle");
    const productCode = document.getElementById("productCode");
    const productBarcode = document.getElementById("productBarcode");
    const productName = document.getElementById("productName");
    const productDesc = document.getElementById("productDesc");
    const productPrice = document.getElementById("productPrice");
    const productStock = document.getElementById("productStock");
    const productImg = document.getElementById("productImg");

    const passModal = document.getElementById("passModal");
    const passInput = document.getElementById("passInput");

    const lockScreen = document.getElementById("lockScreen");
    const unlockPassword = document.getElementById("unlockPassword");
    const unlockPasswordConfirm = document.getElementById("unlockPasswordConfirm");
    const lockText = document.getElementById("lockText");
    const lockNote = document.getElementById("lockNote");
    const appFooter = document.getElementById("appFooter");
    const adminUser = document.getElementById("adminUser");
    const adminPass = document.getElementById("adminPass");
    const adminProducts = document.getElementById("adminProducts");

    function saveLocal() {
      localStorage.setItem(PASS_FLAG_KEY, "1");
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ cart, reports: reportsData }));
    }

    function loadLocal() {
      try {
        const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
        cart = data.cart || [];
        reportsData = data.reports || [];
      } catch (e) {
        cart = [];
        reportsData = [];
      }
    }

    function showMessage(text, type = "info") {
      messageBar.textContent = text;
      messageBar.className = "";
      messageBar.id = "messageBar";
      messageBar.classList.add(type);
      messageBar.style.display = "block";
      clearTimeout(showMessage.timer);
      showMessage.timer = setTimeout(() => messageBar.style.display = "none", 1800);
    }

    function prepareLockScreen() {
      lockText.textContent = "Enter password to unlock POS";
      unlockPasswordConfirm.classList.add("hidden");

    }

    function handleUnlock() {
      const pass = unlockPassword.value.trim();
      if (!pass) {
        lockNote.textContent = "Please enter a password.";
        return;
      }
      if (pass !== LOGIN_PASSWORD) {
        lockNote.textContent = "Wrong password.";
        return;
      }
      appPassword = LOGIN_PASSWORD;
      localStorage.setItem(PASS_FLAG_KEY, "1");
      loadLocal();
      unlockApp();
    }

    function unlockApp() {
      lockScreen.classList.add("hidden");
      document.getElementById("home").classList.remove("hidden");
      searchInput.classList.remove("hidden");
      appFooter.classList.remove("hidden");
      loadProductsFromSQL();
      renderCart();
      renderReports();
    }

    function normalizeValue(value) {
      return String(value || "").trim().toLowerCase();
    }

    function show(section) {
      ["home", "cart", "report", "adminLogin", "adminPage"].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.add("hidden");
      });

      if (section === "adminPage" && !adminLoggedIn) {
        section = "adminLogin";
      }

      document.getElementById(section).classList.remove("hidden");

      if (section === "home") loadProductsFromSQL();
      if (section === "adminPage") renderAdminProfit();
    }

    function mapProduct(p) {
      return {
        id: p.id,
        code: p.code || "",
        barcode: p.barcode || "",
        name: p.name || "",
        desc: p.description || "",
        price: Number(p.price || 0),
        stock: Number(p.stock || 0),
        img: p.image || "",
        cost: Number(p.cost || 0)
      };
    }

    function loadProductsFromSQL() {
      fetch(`${API_URL}/products`)
        .then(res => res.json())
        .then(data => {
          products = Array.isArray(data) ? data.map(mapProduct) : [];
          renderProducts();
        })
        .catch(err => {
          console.log(err);
          showMessage("Cannot load products from SQL", "error");
        });
    }

    function renderProducts(list = products) {
      productList.innerHTML = "";
      if (list.length === 0) {
        productList.innerHTML = `<div class="empty-state">No products found.</div>`;
        return;
      }

      list.forEach((p) => {
        const realIndex = products.indexOf(p);
        productList.innerHTML += `
          <div class="product">
            <img src="${p.img || 'https://via.placeholder.com/110'}" alt="${p.name || 'product'}">
            <div class="name">${p.name || ""}</div>
            <div class="desc">${p.desc || "No description"}</div>
            <div class="meta">
              <div><b>Price:</b> ${Number(p.price || 0).toFixed(2)}$</div>
              <div><b>Stock:</b> ${p.stock ?? 0}</div>
              <div><b>Code:</b> ${p.code || "-"}</div>
              <div><b>Barcode:</b> ${p.barcode || "-"}</div>
            </div>
            <input type="number" value="1" min="1" class="qty" onkeydown="handleQtyEnter(event, ${realIndex}, this)">
            <div class="actions">
              <button onclick="addCart(${realIndex}, this)">Add to Cart</button>
              <button class="secondary" onclick="openProductModal(${realIndex})">Edit</button>
              <button class="danger" onclick="askPass('deleteProduct', ${realIndex})">Delete</button>
            </div>
          </div>`;
      });
    }

    function openProductModal(i = null) {
      editingIndex = i;
      if (i !== null) {
        productModalTitle.textContent = "Edit Product";
        productCode.value = products[i].code || "";
        productBarcode.value = products[i].barcode || "";
        productName.value = products[i].name || "";
        productDesc.value = products[i].desc || "";
        productPrice.value = products[i].price ?? "";
        productStock.value = products[i].stock ?? "";
        productImg.value = products[i].img || "";
      } else {
        productModalTitle.textContent = "Add Product";
        productCode.value = "";
        productBarcode.value = "";
        productName.value = "";
        productDesc.value = "";
        productPrice.value = "";
        productStock.value = "";
        productImg.value = "";
      }
      productModal.classList.remove("hidden");
      setTimeout(() => productName.focus(), 100);
    }

    function closeProductModal() {
      productModal.classList.add("hidden");
      editingIndex = null;
    }

    function productPayload() {
      return {
        code: productCode.value.trim(),
        barcode: productBarcode.value.trim(),
        name: productName.value.trim(),
        description: productDesc.value.trim(),
        price: productPrice.value === "" ? 0 : Number(productPrice.value),
        stock: productStock.value === "" ? 0 : Number(productStock.value),
        image: productImg.value.trim(),
        cost: editingIndex !== null && products[editingIndex] ? Number(products[editingIndex].cost || 0) : 0
      };
    }

    function saveProduct() {
      const item = productPayload();
      if (!item.name) {
        showMessage("Please enter product name", "error");
        return;
      }

      const isEdit = editingIndex !== null && products[editingIndex] && products[editingIndex].id;
      const url = isEdit ? `${API_URL}/products/${products[editingIndex].id}` : `${API_URL}/products`;
      const method = isEdit ? "PUT" : "POST";

      fetch(url, {
        method,
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(item)
      })
        .then(res => res.json())
        .then(() => {
          closeProductModal();
          searchInput.value = "";
          loadProductsFromSQL();
          showMessage(isEdit ? "Product updated in SQL" : "Product saved to SQL", "success");
        })
        .catch(err => {
          console.log(err);
          showMessage("Server error", "error");
        });
    }

    function syncProductToSQL(i) {
      if (!products[i] || !products[i].id) return;
      const p = products[i];
      fetch(`${API_URL}/products/${p.id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          code: p.code,
          barcode: p.barcode,
          name: p.name,
          description: p.desc,
          price: p.price,
          stock: p.stock,
          image: p.img,
          cost: p.cost || 0
        })
      }).catch(err => console.log(err));
    }

    function addCart(i, btn) {
      const qtyInput = btn.closest(".product").querySelector(".qty");
      const q = Number(qtyInput.value);
      if (!q || q < 1) {
        showMessage("Invalid quantity", "error");
        qtyInput.focus();
        return;
      }
      if (q > (products[i].stock || 0)) {
        showMessage("Not enough stock", "error");
        return;
      }

      const existing = cart.findIndex(item => item.id === products[i].id);
      if (existing !== -1) cart[existing].qty += q;
      else cart.push({ ...products[i], qty: q });

      products[i].stock = (products[i].stock || 0) - q;
      syncProductToSQL(i);
      saveLocal();
      renderCart();
      searchProduct();
      showMessage("Added to cart", "success");
    }

    function renderCart() {
      let total = 0;
      cartList.innerHTML = "";
      if (cart.length === 0) {
        cartList.innerHTML = "<li>Cart is empty</li>";
        totalEl.innerText = "0.00";
        return;
      }
      cart.forEach((x, i) => {
        const sub = (x.qty || 0) * (x.price || 0);
        total += sub;
        cartList.innerHTML += `
          <li>
            ${x.name} ${x.code ? "(" + x.code + ")" : ""} x${x.qty} = ${sub.toFixed(2)}$
            <button class="danger" style="margin-left:8px;padding:4px 8px;font-size:12px;" onclick="removeCartItem(${i})">Remove</button>
          </li>`;
      });
      totalEl.innerText = total.toFixed(2);
    }

    function findProductIndex(item) {
      return products.findIndex(p =>
        (item.id && p.id === item.id) ||
        (item.barcode && p.barcode === item.barcode) ||
        (item.code && p.code === item.code) ||
        (!item.barcode && !item.code && p.name === item.name)
      );
    }

    function removeCartItem(i) {
      const item = cart[i];
      const productIndex = findProductIndex(item);
      if (productIndex !== -1) {
        products[productIndex].stock = (products[productIndex].stock || 0) + (item.qty || 0);
        syncProductToSQL(productIndex);
      }
      cart.splice(i, 1);
      saveLocal();
      renderCart();
      searchProduct();
      showMessage("Item removed", "info");
    }

    function clearCart() {
      if (cart.length === 0) {
        showMessage("Cart is empty", "error");
        return;
      }
      cart.forEach(item => {
        const productIndex = findProductIndex(item);
        if (productIndex !== -1) {
          products[productIndex].stock = (products[productIndex].stock || 0) + (item.qty || 0);
          syncProductToSQL(productIndex);
        }
      });
      cart = [];
      saveLocal();
      renderCart();
      searchProduct();
      showMessage("Cart cleared", "info");
    }

    function checkout(method) {
      const totalVal = Number(totalEl.innerText);
      const client = clientInput.value.trim();
      if (cart.length === 0) {
        showMessage("Cart is empty", "error");
        return;
      }
      reportsData.push({
        date: new Date().toLocaleDateString(),
        time: new Date().toLocaleTimeString(),
        client: client || "-",
        method,
        cart: [...cart],
        total: totalVal
      });
      cart = [];
      clientInput.value = "";
      saveLocal();
      renderCart();
      renderReports();
      loadProductsFromSQL();
      show("report");
      showMessage("Checkout done", "success");
    }

    function renderReports() {
      reportsGrid.innerHTML = "";
      if (reportsData.length === 0) {
        reportsGrid.innerHTML = `<div class="empty-state">No reports available yet.</div>`;
        return;
      }
      [...reportsData].reverse().forEach((r, i) => {
        const realIndex = reportsData.length - 1 - i;
        const items = r.cart.map(x => `${x.name} ${x.code ? "(" + x.code + ")" : ""} x${x.qty} = ${((x.qty || 0) * (x.price || 0)).toFixed(2)}$`).join("<br>");
        reportsGrid.innerHTML += `
          <div class="report-box">
            <div>
              <b>${r.date}</b><br>
              Time: ${r.time || "-"}<br>
              Client: ${r.client || "-"}<br>
              Method: ${r.method}<br>
              <div class="report-items">${items}</div>
            </div>
            <div>
              <b>Total: ${Number(r.total).toFixed(2)}$</b><br><br>
              <button class="danger" onclick="askPass('deleteReport', ${realIndex})">Delete</button>
              <button onclick="pdf(${realIndex})">PDF</button>
            </div>
          </div>`;
      });
    }

    function askPass(m, i) {
      mode = m;
      index = i;
      passInput.value = "";
      passModal.classList.remove("hidden");
      setTimeout(() => passInput.focus(), 100);
    }

    function closePassModal() {
      passModal.classList.add("hidden");
      mode = null;
      index = null;
    }

    function confirmPass() {
      if (passInput.value !== LOGIN_PASSWORD) {
        showMessage("Wrong password", "error");
        passInput.focus();
        return;
      }

      if (mode === "deleteProduct") {
        const p = products[index];
        if (p && p.id) {
          fetch(`${API_URL}/products/${p.id}`, { method: "DELETE" })
            .then(() => loadProductsFromSQL())
            .catch(err => console.log(err));
        } else {
          products.splice(index, 1);
          renderProducts();
        }
        showMessage("Product deleted", "info");
      }

      if (mode === "deleteReport") {
        reportsData.splice(index, 1);
        saveLocal();
        renderReports();
        showMessage("Report deleted", "info");
      }
      closePassModal();
    }

    function pdf(i) {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      const r = reportsData[i];
      let y = 15;
      doc.setFont("helvetica", "bold");
      doc.setFontSize(18);
      doc.text("AWAD POS SALES REPORT", 105, y, { align: "center" });
      y += 10;
      doc.line(10, y, 200, y);
      y += 10;
      doc.setFont("helvetica", "normal");
      doc.setFontSize(11);
      doc.text(`Date: ${r.date}`, 10, y);
      doc.text(`Time: ${r.time || "-"}`, 140, y);
      y += 7;
      doc.text(`Client: ${r.client || "-"}`, 10, y);
      y += 7;
      doc.text(`Payment Method: ${r.method}`, 10, y);
      y += 10;
      doc.setFont("helvetica", "bold");
      doc.setFillColor(230, 230, 230);
      doc.rect(10, y - 5, 190, 8, "F");
      doc.text("Code", 12, y);
      doc.text("Product", 38, y);
      doc.text("Qty", 120, y);
      doc.text("Price", 140, y);
      doc.text("Total", 170, y);
      y += 8;
      doc.setFont("helvetica", "normal");
      r.cart.forEach(item => {
        const itemTotal = (item.qty || 0) * (item.price || 0);
        if (y > 270) { doc.addPage(); y = 20; }
        doc.text(String(item.code || "-"), 12, y);
        doc.text(String(item.name || "").substring(0, 28), 38, y);
        doc.text(String(item.qty || 0), 120, y);
        doc.text(`${Number(item.price || 0).toFixed(2)}$`, 140, y);
        doc.text(`${itemTotal.toFixed(2)}$`, 170, y);
        y += 8;
      });
      y += 5;
      doc.line(10, y, 200, y);
      y += 10;
      doc.setFont("helvetica", "bold");
      doc.setFontSize(14);
      doc.text(`Grand Total: ${Number(r.total).toFixed(2)}$`, 200, y, { align: "right" });
      y += 15;
      doc.setFont("helvetica", "normal");
      doc.setFontSize(10);
      doc.text("Thank you for using AWAD POS", 105, y, { align: "center" });
      doc.save(`report-${r.client || 'client'}-${r.date}.pdf`);
    }

    function searchProduct() {
      const value = normalizeValue(searchInput.value);
      if (value === "") {
        renderProducts(products);
        return;
      }
      const filtered = products.filter(p => [p.name, p.code, p.barcode, p.desc].map(normalizeValue).join(" ").includes(value));
      renderProducts(filtered);
    }

    function handleQtyEnter(e, i, input) {
      if (e.key === "Enter") addCart(i, input.closest(".product").querySelector("button"));
    }


    function adminLogin() {
      const user = adminUser.value.trim();
      const pass = adminPass.value.trim();

      if (user === "admin" && pass === "2488") {
        adminLoggedIn = true;
        adminPass.value = "";
        showMessage("Admin login successful", "success");
        loadProductsFromSQL();
        show("adminPage");
      } else {
        showMessage("Wrong admin username or password", "error");
        adminPass.focus();
      }
    }

    function adminLogout() {
      adminLoggedIn = false;
      adminUser.value = "";
      adminPass.value = "";
      show("home");
      showMessage("Admin logged out", "info");
    }

    function getProductKey(item) {
      return String(item.id || item.code || item.barcode || item.name || "").trim();
    }

    function findCurrentProductForSale(item) {
      return products.find(p =>
        (item.id && p.id === item.id) ||
        (item.code && p.code === item.code) ||
        (item.barcode && p.barcode === item.barcode) ||
        (item.name && p.name === item.name)
      );
    }

    function getSaleCost(item) {
      const itemCost = Number(item.cost || 0);
      if (itemCost > 0) return itemCost;
      const currentProduct = findCurrentProductForSale(item);
      return Number(currentProduct ? currentProduct.cost || 0 : 0);
    }

    function getSoldProfitStats() {
      const stats = {};
      let totalQty = 0;
      let totalRevenue = 0;
      let totalCost = 0;
      let totalProfit = 0;

      reportsData.forEach(report => {
        (report.cart || []).forEach(item => {
          const qty = Number(item.qty || 0);
          const price = Number(item.price || 0);
          const cost = getSaleCost(item);
          const revenue = price * qty;
          const costTotal = cost * qty;
          const profit = revenue - costTotal;
          const key = getProductKey(item);

          if (!stats[key]) {
            stats[key] = {
              id: item.id || "-",
              code: item.code || "-",
              name: item.name || "-",
              qty: 0,
              cost,
              price,
              revenue: 0,
              costTotal: 0,
              profit: 0
            };
          }

          stats[key].qty += qty;
          stats[key].revenue += revenue;
          stats[key].costTotal += costTotal;
          stats[key].profit += profit;
          stats[key].cost = cost;
          stats[key].price = price;

          totalQty += qty;
          totalRevenue += revenue;
          totalCost += costTotal;
          totalProfit += profit;
        });
      });

      const rows = Object.values(stats).sort((a, b) => b.profit - a.profit);
      const bestSelling = rows.length ? [...rows].sort((a, b) => b.qty - a.qty)[0] : null;

      return { rows, totalQty, totalRevenue, totalCost, totalProfit, bestSelling };
    }

    function renderAdminProfit() {
      if (!adminProducts) return;

      const sold = getSoldProfitStats();

      let expectedInventoryProfit = 0;
      products.forEach(p => {
        expectedInventoryProfit += (Number(p.price || 0) - Number(p.cost || 0)) * Number(p.stock || 0);
      });

      let html = `
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:15px;">
          <div class="admin-card"><b>Total Revenue</b><br><span style="font-size:22px;">${sold.totalRevenue.toFixed(2)}$</span></div>
          <div class="admin-card"><b>Total Cost</b><br><span style="font-size:22px;">${sold.totalCost.toFixed(2)}$</span></div>
          <div class="admin-card"><b>Net Profit From Sales</b><br><span class="${sold.totalProfit >= 0 ? "profit-positive" : "profit-negative"}" style="font-size:22px;">${sold.totalProfit.toFixed(2)}$</span></div>
          <div class="admin-card"><b>Total Qty Sold</b><br><span style="font-size:22px;">${sold.totalQty}</span></div>
          <div class="admin-card"><b>Best Selling</b><br><span style="font-size:18px;">${sold.bestSelling ? sold.bestSelling.name + " x" + sold.bestSelling.qty : "-"}</span></div>
          <div class="admin-card"><b>Expected Profit From Current Stock</b><br><span style="font-size:22px;">${expectedInventoryProfit.toFixed(2)}$</span></div>
        </div>

        <h3>Profit From Sold Products</h3>
      `;

      if (sold.rows.length === 0) {
        html += `<div class="empty-state">No sold products yet. After checkout, sold-product profit will appear here.</div>`;
      } else {
        html += `
          <table class="admin-table">
            <tr>
              <th>Product</th>
              <th>Code</th>
              <th>Qty Sold</th>
              <th>Cost / Unit</th>
              <th>Price / Unit</th>
              <th>Revenue</th>
              <th>Total Cost</th>
              <th>Profit</th>
            </tr>
        `;

        sold.rows.forEach(row => {
          html += `
            <tr>
              <td>${row.name}</td>
              <td>${row.code}</td>
              <td>${row.qty}</td>
              <td>${row.cost.toFixed(2)}$</td>
              <td>${row.price.toFixed(2)}$</td>
              <td>${row.revenue.toFixed(2)}$</td>
              <td>${row.costTotal.toFixed(2)}$</td>
              <td class="${row.profit >= 0 ? "profit-positive" : "profit-negative"}">${row.profit.toFixed(2)}$</td>
            </tr>
          `;
        });

        html += `</table>`;
      }

      html += `
        <br>
        <h3>Manage Cost / Price From SQL Products</h3>
        <table class="admin-table">
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Current Stock</th>
            <th>Cost</th>
            <th>Price</th>
            <th>Profit / Unit</th>
            <th>Expected Profit In Stock</th>
            <th>Action</th>
          </tr>
      `;

      products.forEach((p, i) => {
        const cost = Number(p.cost || 0);
        const price = Number(p.price || 0);
        const stock = Number(p.stock || 0);
        const profit = price - cost;
        const lineProfit = profit * stock;
        const profitClass = profit >= 0 ? "profit-positive" : "profit-negative";

        html += `
          <tr>
            <td>${p.id || "-"}</td>
            <td>${p.name || "-"}</td>
            <td>${stock}</td>
            <td><input id="adminCost${i}" type="number" min="0" step="0.01" value="${cost}"></td>
            <td><input id="adminPrice${i}" type="number" min="0" step="0.01" value="${price}"></td>
            <td class="${profitClass}">${profit.toFixed(2)}$</td>
            <td class="${lineProfit >= 0 ? "profit-positive" : "profit-negative"}">${lineProfit.toFixed(2)}$</td>
            <td><button class="success" onclick="saveAdminFinance(${i})">Save</button></td>
          </tr>
        `;
      });

      html += `</table>`;
      adminProducts.innerHTML = html;
    }

    function saveAdminFinance(i) {
      const p = products[i];
      if (!p || !p.id) return;

      const newCost = Number(document.getElementById(`adminCost${i}`).value || 0);
      const newPrice = Number(document.getElementById(`adminPrice${i}`).value || 0);

      fetch(`${API_URL}/products/${p.id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          code: p.code,
          barcode: p.barcode,
          name: p.name,
          description: p.desc,
          price: newPrice,
          stock: p.stock,
          image: p.img,
          cost: newCost
        })
      })
        .then(res => res.json())
        .then(() => {
          showMessage("Cost/Price updated", "success");
          loadProductsFromSQL();
          setTimeout(renderAdminProfit, 300);
        })
        .catch(err => {
          console.log(err);
          showMessage("Admin update failed", "error");
        });
    }

    function setupEnterNavigation() {
      const productInputs = [productCode, productBarcode, productName, productDesc, productPrice, productStock, productImg];
      productInputs.forEach((input, idx) => {
        input.addEventListener("keydown", function(e) {
          if (e.key === "Enter" && this.tagName !== "TEXTAREA") {
            e.preventDefault();
            const next = productInputs[idx + 1];
            if (next) next.focus();
            else saveProduct();
          }
        });
      });
      productDesc.addEventListener("keydown", function(e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          productPrice.focus();
        }
      });
      clientInput.addEventListener("keydown", function(e) { if (e.key === "Enter") checkout("Cash"); });
      passInput.addEventListener("keydown", function(e) { if (e.key === "Enter") confirmPass(); });
      unlockPassword.addEventListener("keydown", function(e) { if (e.key === "Enter") handleUnlock(); });
      unlockPasswordConfirm.addEventListener("keydown", function(e) { if (e.key === "Enter") handleUnlock(); });
      adminUser.addEventListener("keydown", function(e) { if (e.key === "Enter") adminPass.focus(); });
      adminPass.addEventListener("keydown", function(e) { if (e.key === "Enter") adminLogin(); });
    }

    prepareLockScreen();
    setupEnterNavigation();
  </script>
</body>
</html>
